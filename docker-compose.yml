version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: fuzentrix-postgres
    environment:
      POSTGRES_DB: fuzentrix_db
      POSTGRES_USER: fuzentrix
      POSTGRES_PASSWORD: fuzentrix@pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: fuzentrix-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
