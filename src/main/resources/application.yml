spring:
  application:
    name: fuzentrix-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/fuzentrix_db
    username: fuzentrix
    password: fuzentrix@pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

server:
  port: 8080

minio:
  url: http://localhost:9000
  accessKey: minio
  secretKey: minio123
  bucketName: fuzentrix
